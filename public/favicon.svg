<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background: full square, near-black -->
  <rect width="200" height="200" fill="#050507"/>
  <!-- Subtle top-left accent corner line -->
  <line x1="0" y1="0" x2="48" y2="0" stroke="#ff7a2f" stroke-width="4"/>
  <line x1="0" y1="0" x2="0" y2="48" stroke="#ff7a2f" stroke-width="4"/>
  <!-- Bottom-right accent corner line -->
  <line x1="200" y1="200" x2="152" y2="200" stroke="#ff7a2f" stroke-width="4"/>
  <line x1="200" y1="200" x2="200" y2="152" stroke="#ff7a2f" stroke-width="4"/>
  <!-- "O" in white -->
  <text x="52" y="130" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" fill="#f5efe6" letter-spacing="-4">O</text>
  <!-- "/" slash in accent -->
  <text x="108" y="130" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" fill="#ff7a2f">/</text>
</svg>